name: Release CI

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering from GitHub Actions UI

jobs:
  build-and-release:
    runs-on: windows-latest
    # Only run if commit message contains [build] or [release], or if triggered manually
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[build]') ||
      contains(github.event.head_commit.message, '[release]')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Get version from tauri.conf.json
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version" | tr -d '\r')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Tauri App
        run: npm run tauri build

      - name: Prepare portable binary
        shell: bash
        run: |
          cp src-tauri/target/release/widg-bar.exe src-tauri/target/release/widg-bar-portable.exe

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: WidgBar v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/widg-bar-portable.exe
          token: ${{ secrets.GITHUB_TOKEN }}
          overwrite_files: true